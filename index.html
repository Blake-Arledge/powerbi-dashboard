<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Texas Water Trends Dashboard</title>
  <style>
    :root {
      /* Tweak these to taste */
      --frame: 32px;          /* consistent border around banner + report */
      --banner-height: 150px; /* banner height (smaller = less vertical space) */
      --buffer-bottom: 0px;   /* space below the report */
      --bg: #1f2c44;          /* page background (frame color) */

      /*
        IMPORTANT: set these two to EXACTLY match your Power BI canvas
        size (Format page -> Canvas settings). The report fills the width
        and scrolls vertically; matching the ratio removes all white bars.
      */
      --canvas-w: 1280;       /* Power BI canvas width  */
      --canvas-h: 1800;       /* Power BI canvas height */
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      background: var(--bg);
    }

    /* Banner header: framed 32px on top and sides, height-capped, centered */
    .site-header {
      flex: 0 0 auto;
      line-height: 0;
      padding: var(--frame) var(--frame) 0;
      text-align: center;
    }

    .site-header img {
      display: inline-block;
      height: var(--banner-height);
      width: auto;
      max-width: 100%;
      border-radius: 8px;
    }

    /*
      Report area: fills the remaining height and scrolls vertically.
      The iframe spans the full width; its height follows the canvas
      aspect ratio, so the report is "fit to width" and any overflow
      scrolls instead of being squeezed to fit on screen.
    */
    .report-container {
      flex: 1 1 auto;
      min-height: 0;
      margin: var(--frame) var(--frame) var(--buffer-bottom);
      overflow-y: auto;
      overflow-x: hidden;
      border-radius: 8px;
      background: var(--bg);
    }

    .report-container iframe {
      display: block;
      width: 100%;
      aspect-ratio: var(--canvas-w) / var(--canvas-h);
      border: none;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <img src="twt-banner.png" alt="Texas Water Trends Dashboard" />
  </header>
  <div class="report-container">
    <iframe
      title="Texas Water Trends"
      src="https://app.powerbi.com/view?r=eyJrIjoiYTViMDg3NWEtMThiMy00Nzg2LWJmMTEtZjcxNzJhNDU2Y2QxIiwidCI6IjlmZDc1ODBhLTY0NzItNGQ5Yy1hMTQyLWQxMzFkM2E3YTExNiIsImMiOjN9"
      allowfullscreen="true">
    </iframe>
  </div>
</body>
</html>
