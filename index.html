<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Texas Water Trends Dashboard</title>
  <style>
    :root {
      /* Tweak these to taste */
      --zoom: 0.6;            /* report zoom level (1 = fit to page) */
      --frame: 32px;          /* consistent border around banner + report */
      --banner-height: 150px; /* banner height (smaller = less vertical space) */
      --buffer-bottom: 0px;   /* space below the report */
      --bg: #1f2c44;          /* page background (frame color) */
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      background: var(--bg);
    }

    /* Banner header: framed 32px on top and sides, height-capped, centered */
    .site-header {
      flex: 0 0 auto;
      line-height: 0;
      padding: var(--frame) var(--frame) 0;
      text-align: center;
    }

    .site-header img {
      display: inline-block;
      height: var(--banner-height);
      width: auto;
      max-width: 100%;
      border-radius: 8px;
    }

    /* Report area fills the remaining height, framed 32px on the sides */
    .report-container {
      flex: 1 1 auto;
      position: relative;
      margin: var(--frame) var(--frame) var(--buffer-bottom);
      overflow: hidden;
      border-radius: 8px;
    }

    /*
      Zoom: the iframe is rendered larger (100% / zoom) and then scaled
      down so the report content displays at the chosen zoom level while
      still filling the available area.
    */
    .report-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: calc(100% / var(--zoom));
      height: calc(100% / var(--zoom));
      border: none;
      transform: scale(var(--zoom));
      transform-origin: top left;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <img src="twt-banner.png" alt="Texas Water Trends Dashboard" />
  </header>
  <div class="report-container">
    <iframe
      title="Texas Water Trends"
      src="https://app.powerbi.com/view?r=eyJrIjoiYTViMDg3NWEtMThiMy00Nzg2LWJmMTEtZjcxNzJhNDU2Y2QxIiwidCI6IjlmZDc1ODBhLTY0NzItNGQ5Yy1hMTQyLWQxMzFkM2E3YTExNiIsImMiOjN9"
      allowfullscreen="true">
    </iframe>
  </div>
</body>
</html>
