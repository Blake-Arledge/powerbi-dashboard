<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Power BI Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #f4f5f7;
    }

    /* Full-screen viewport that clips the scaled iframe */
    .report-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /*
      Zoom to 60%: the iframe is rendered at 1/0.6 = 166.667% of the
      viewport, then scaled down to 0.6 so it fills the screen exactly
      while showing the report content at 60% size.
    */
    .report-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 166.667%;
      height: 166.667%;
      border: none;
      transform: scale(0.6);
      transform-origin: top left;
    }
  </style>
</head>
<body>
  <div class="report-container">
    <iframe
      title="Power BI Report"
      src="https://app.powerbi.com/view?r=eyJrIjoiMGE2NWE1M2UtODJkNi00MTNiLTkxMjktODBiNzY2Zjg2MmIxIiwidCI6IjlmZDc1ODBhLTY0NzItNGQ5Yy1hMTQyLWQxMzFkM2E3YTExNiIsImMiOjN9"
      allowfullscreen="true">
    </iframe>
  </div>
</body>
</html>
