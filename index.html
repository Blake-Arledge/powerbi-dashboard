<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Power BI Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f4f5f7;
    }

    .page {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      background: #1f2937;
      color: #fff;
      padding: 14px 24px;
      flex: 0 0 auto;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
    }

    .report-container {
      flex: 1 1 auto;
      position: relative;
    }

    .report-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <h1>Dashboard</h1>
    </header>
    <div class="report-container">
      <iframe
        title="Power BI Report"
        src="https://app.powerbi.com/view?r=eyJrIjoiMGE2NWE1M2UtODJkNi00MTNiLTkxMjktODBiNzY2Zjg2MmIxIiwidCI6IjlmZDc1ODBhLTY0NzItNGQ5Yy1hMTQyLWQxMzFkM2E3YTExNiIsImMiOjN9"
        allowfullscreen="true">
      </iframe>
    </div>
  </div>
</body>
</html>
