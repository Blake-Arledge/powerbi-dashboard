<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Power BI Dashboard</title>
  <style>
    :root {
      /* Tweak these to taste */
      --zoom: 0.6;            /* report zoom level */
      --buffer-top: 32px;     /* space above the report */
      --buffer-side: 200px;   /* space on left and right */
      --buffer-bottom: 0px;   /* space below the report */
      --bg: #1f2c44;          /* page background (contrast frame) */
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
    }

    /* Report area: wide side frames, top buffer, flush to bottom */
    .report-container {
      position: fixed;
      top: var(--buffer-top);
      left: var(--buffer-side);
      width: calc(100vw - 2 * var(--buffer-side));
      height: calc(100vh - var(--buffer-top) - var(--buffer-bottom));
      overflow: hidden;
      border-top-left-radius: 8px;
      border-top-right-radius: 8px;
    }

    /*
      Zoom: the iframe is rendered larger (100% / zoom) and then scaled
      down so the report content displays at the chosen zoom level while
      still filling the available area.
    */
    .report-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: calc(100% / var(--zoom));
      height: calc(100% / var(--zoom));
      border: none;
      transform: scale(var(--zoom));
      transform-origin: top left;
    }
  </style>
</head>
<body>
  <div class="report-container">
    <iframe
      title="Power BI Report"
      src="https://app.powerbi.com/view?r=eyJrIjoiMGE2NWE1M2UtODJkNi00MTNiLTkxMjktODBiNzY2Zjg2MmIxIiwidCI6IjlmZDc1ODBhLTY0NzItNGQ5Yy1hMTQyLWQxMzFkM2E3YTExNiIsImMiOjN9"
      allowfullscreen="true">
    </iframe>
  </div>
</body>
</html>
